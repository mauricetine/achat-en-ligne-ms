spring.application.name=achat-en-ligne-ms
server.port=8080

# ===================== H2 (Dev) =====================
spring.datasource.url=jdbc:h2:mem:achatdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================== JPA =====================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================== Swagger =====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===================== JWT =====================
jwt.secret=VGhpc0lzQVZlcnlMb25nU2VjcmV0S2V5Rm9yQWNoYXRFbkxpZ25lTWljcm9zZXJ2aWNlMjAyNA==
jwt.expiration=86400000

# ===================== Cache =====================
spring.cache.type=simple

# ===================== Logs =====================
logging.level.com.groupeisi.company=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
